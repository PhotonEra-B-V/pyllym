name: Publish to PyPI

# Publishes the package whenever a v* tag is pushed (e.g. v1.16.0a1).
# Uses PyPI Trusted Publishing (OIDC) — no API token is stored in the repo.
# One-time setup on PyPI: project pyllym -> Settings -> Publishing -> add a
# GitHub trusted publisher with:
#   owner: PhotonEra-B-V   repo: pyllym   workflow: publish.yml   environment: pypi

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v7
        with:
          python-version: "3.13"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check dist/*

      - name: Verify tag matches package version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(ls dist/*.tar.gz | sed -E 's/.*pyllym-(.*)\.tar\.gz/\1/')"
          echo "tag=$tag  package=$pkg"
          if [ "$tag" != "$pkg" ]; then
            echo "::error::Tag ($tag) does not match built version ($pkg)"
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1